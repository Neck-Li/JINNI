name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "Adding HF remote..."
          git remote add hf https://Neck-Li:$HF_TOKEN@huggingface.co/spaces/Neck-Li/jinni
          echo "Pushing to HF..."
          git push hf main --force 2>&1 || echo "PUSH FAILED with exit code $?"
